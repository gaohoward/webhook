apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingWebhookConfiguration
metadata:
  name: images-caching-webhook-config
webhooks:
- admissionReviewVersions:
  - v1
  name: cdi.images-caching.io
  clientConfig:
    caBundle: 
    service:
      name: cdi-images-caching-svc
      namespace: image-webhook
      path: /validate-images
      port: 443
  failurePolicy: Fail
  rules:
  - apiGroups:
    - ""
    apiVersions:
    - v1
    operations:
    - CREATE
    resources:
    - pods
    scope: "*"
  sideEffects: None
  timeoutSeconds: 10

